<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Premium Workspace</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#368ce2",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111921",
                        "glass-border": "rgba(255, 255, 255, 0.4)",
                        "glass-surface": "rgba(255, 255, 255, 0.65)",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "2xl": "2rem",
                        "3xl": "2.5rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        "glass": "0 8px 32px 0 rgba(31, 38, 135, 0.07)",
                        "glass-hover": "0 8px 32px 0 rgba(31, 38, 135, 0.15)",
                    }
                },
            },
        }
    </script>
<style>
        /* Custom glass styles for better cross-browser consistency */
        .glass-panel {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
        }
        
        .dark .glass-panel {
            background: rgba(17, 25, 33, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.2s ease;
        }

        .dark .glass-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: white;
        }

        .glass-input:focus {
            background: rgba(255, 255, 255, 0.8);
            border-color: #368ce2;
            box-shadow: 0 0 0 2px rgba(54, 140, 226, 0.2);
        }
        
        .dark .glass-input:focus {
            background: rgba(0, 0, 0, 0.4);
            border-color: #368ce2;
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-[#111417] dark:text-white transition-colors duration-300">
<!-- Decorative background elements -->
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
<!-- Abstract gradient blobs -->
<div class="absolute top-[-10%] left-[-5%] w-[600px] h-[600px] rounded-full bg-blue-300/20 dark:bg-blue-600/10 blur-[100px]"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[600px] h-[600px] rounded-full bg-purple-300/20 dark:bg-purple-600/10 blur-[100px]"></div>
<div class="absolute top-[40%] left-[40%] w-[300px] h-[300px] rounded-full bg-pink-200/20 dark:bg-pink-600/10 blur-[80px]"></div>
</div>
<!-- Main Content Wrapper -->
<div class="relative flex min-h-screen w-full flex-col items-center justify-center p-4 z-10">
<!-- Glass Card -->
<div class="glass-panel w-full max-w-[480px] rounded-3xl p-8 md:p-10 flex flex-col gap-8 relative overflow-hidden">
<!-- Shine effect on top left -->
<div class="absolute top-0 left-0 w-full h-full bg-gradient-to-br from-white/40 via-transparent to-transparent pointer-events-none opacity-50"></div>
<!-- Header Section -->
<div class="flex flex-col items-center gap-2 text-center relative z-10">
<div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-primary to-blue-400 flex items-center justify-center shadow-lg shadow-blue-500/30 mb-2">
<span class="material-symbols-outlined text-white text-3xl">view_in_ar</span>
</div>
<h1 class="text-[#111417] dark:text-white text-3xl font-bold tracking-tight">Welcome back</h1>
<p class="text-[#647587] dark:text-gray-400 text-base font-normal">Enter your details to access your workspace</p>
</div>

<p class="status">{{status()}}</p>
<!-- Login Form -->
<form #loginForm="ngForm"  class="flex flex-col gap-5 relative z-10" (ngSubmit)="Login()">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="text-[#111417] dark:text-gray-200 text-sm font-semibold ml-1">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 dark:text-gray-400 z-10">mail</span>
<input class="glass-input w-full rounded-xl py-3.5 pl-11 pr-4 text-base placeholder:text-gray-400
 dark:placeholder:text-gray-600 outline-none ring-0" name="email" [(ngModel)]="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center ml-1">
<label class="text-[#111417] dark:text-gray-200 text-sm font-semibold">Password</label>
<a class="text-primary hover:text-blue-600 text-sm font-medium transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 dark:text-gray-400 z-10">lock</span>
<input class="glass-input w-full rounded-xl py-3.5 pl-11 pr-12 text-base placeholder:text-gray-400 
dark:placeholder:text-gray-600 outline-none ring-0" name="password" [(ngModel)]="password" placeholder="Enter your password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button type="submit" class="mt-2 w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-12 bg-primary hover:bg-blue-600 text-white text-base font-bold tracking-wide transition-all shadow-lg shadow-blue-500/25 active:scale-[0.98]">
                    Log In
                </button>
</form>
<!-- Divider -->
<div class="relative z-10 flex items-center gap-3 w-full">
<div class="h-[1px] flex-1 bg-gradient-to-r from-transparent via-gray-300 to-transparent dark:via-gray-600"></div>
<span class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Or continue with</span>
<div class="h-[1px] flex-1 bg-gradient-to-r from-transparent via-gray-300 to-transparent dark:via-gray-600"></div>
</div>
<!-- Social Login -->
<div class="grid grid-cols-2 gap-4 relative z-10">
<button class="glass-input flex items-center justify-center gap-2 rounded-xl h-12 hover:bg-white/60 dark:hover:bg-white/10 transition-colors">
<!-- Google SVG Icon -->
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-[#111417] dark:text-white font-medium text-sm">Google</span>
</button>
<button class="glass-input flex items-center justify-center gap-2 rounded-xl h-12 hover:bg-white/60 dark:hover:bg-white/10 transition-colors">
<!-- Apple SVG Icon -->
<svg class="w-5 h-5 text-black dark:text-white" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.64 3.4 1.63-3.12 1.88-2.6 5.86.35 7.1-1.27 3.19-2.28 4.27-2.4 4.28zm-3.12-16.1c1.22-.86 1.93-1.99 1.8-3.18-1.55.19-2.78 1.12-3.46 2.09-.76 1.05-1.35 2.16-1.12 3.26 1.35.21 2.22-.65 2.78-2.17z"></path>
</svg>
<span class="text-[#111417] dark:text-white font-medium text-sm">Apple</span>
</button>
</div>
<!-- Footer -->
<div class="text-center relative z-10">
<p class="text-sm text-gray-500 dark:text-gray-400">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline" href="/signup">Sign Up</a>
</p>
</div>
</div>
<!-- Bottom floating tagline -->
<div class="mt-8 text-center opacity-60 z-10">
<p class="text-xs text-gray-500 dark:text-gray-400 font-medium tracking-widest uppercase">Premium Spatial Portfolio Builder</p>
</div>
</div>
</body></html>
